include:
    - "app/**/*.php"
    - "app/**/*.blade.php"
    - "database/{migrations,factories}/**/*.php"
    - "routes/**/*.php"
    - "tests/"
    - "docs/**/*.md"
    - "config/*.php"
    - "prompts/"
    - "resources/"
    - "profiles/"
    - "bootstrap/*.php"
    - "*.{js,json,md}"
    - "phpunit.xml.dist"
    - "application"

exclude: []

always:
    - "composer.json"
    - "README.md"
    - ".env.example"
    - ".cursor/**/*"
